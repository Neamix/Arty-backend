[www]
user = www
group = www
listen = 127.0.0.1:9000
listen.owner = www
listen.group = www

pm = dynamic
pm.max_children = 30
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 1000

clear_env = no
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null
